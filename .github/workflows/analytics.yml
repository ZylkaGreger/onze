name: Analytics

# Daily Onze traffic snapshot. Posts the numbers as a comment on a tracking issue and
# @mentions the owner — so GitHub emails you the morning numbers, no dashboard needed.
# Also written to the workflow run Summary, and runnable on demand from the Actions tab.
# Safely no-ops until the CLOUDFLARE_API_TOKEN secret is set.
#
# One-time setup (run in your onze terminal, where the token lives and gh is logged in):
#   gh secret set CLOUDFLARE_API_TOKEN                                   # paste the token when prompted
#   gh variable set CF_ACCOUNT_ID --body cb1598f211bfbc012a89d0457994e663
#   gh workflow run Analytics                                            # optional: test it right now

on:
  schedule:
    - cron: '5 6 * * *'    # every morning ~06:05 UTC (just after the health-check)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull analytics
        id: pull
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⏭️ CLOUDFLARE_API_TOKEN secret not set — add it (see this file's header) to enable." | tee -a "$GITHUB_STEP_SUMMARY"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          node tools/analytics.mjs | tee out.txt
          { echo '```'; cat out.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"

      - name: Email the numbers (issue comment + @mention)
        if: steps.pull.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Onze daily analytics"
          num=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')
          if [ -z "$num" ]; then
            gh issue create --title "$title" \
              --body "Automated daily traffic snapshot for onzedaily.com — each morning's numbers are posted below and emailed via the @mention. Close this issue to stop the emails (the run Summary still records them)."
            num=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')
          fi
          {
            echo "📊 **$(date -u '+%A %-d %B %Y')** — onzedaily.com"
            echo
            echo '```'
            cat out.txt
            echo '```'
            echo
            echo "cc @${{ github.repository_owner }}"
          } > comment.md
          gh issue comment "$num" --body-file comment.md
