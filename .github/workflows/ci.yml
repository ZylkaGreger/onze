name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * *'   # every morning ~06:00 UTC — checks the live site is healthy
  workflow_dispatch:

jobs:
  # Validate the committed dataset + matching logic on every push.
  data-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node --test tools/test.mjs

  # Every morning (and on push): is onzedaily.com up and is TODAY's puzzle playable?
  # A failure here emails the repo owner — the daily "is it all available?" check.
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node tools/health-check.mjs
